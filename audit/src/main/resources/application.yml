server:
  port: 8086
spring:
  application:
    name: audit
  config:
    import: optional:configserver:http://config-server:8888
  data:
    cassandra:
      keyspace-name: clearflow
      contact-points: ${SPRING_DATA_CASSANDRA_CONTACT_POINTS:localhost}
      local-datacenter: datacenter1
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
