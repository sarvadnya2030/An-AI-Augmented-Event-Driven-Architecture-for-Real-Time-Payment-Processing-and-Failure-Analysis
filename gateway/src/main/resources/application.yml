spring:
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  application:
    name: gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8090/realms/clearflow}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      password: ${REDIS_PASSWORD:clearflow123}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:kafka:9092}
    producer:
      acks: all
      retries: 3
      enable-idempotence: true
      transaction-id-prefix: clearflow-gateway-
  artemis:
    broker-url: tcp://${ARTEMIS_HOST:activemq-artemis}:61616
    user: ${ARTEMIS_USER:clearflow}
    password: ${ARTEMIS_PASSWORD:clearflow123}
  main:
    allow-bean-definition-overriding: true
resilience4j:
  circuitbreaker:
    instances:
      activemq:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
      redis:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
      kafka:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
      solace:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  info:
    title: ClearFlow ${spring.application.name}
    version: 1.0.0
    description: ISO 20022 payment processing microservice
security:
  cors:
    allowed-origins:
      - http://localhost:3000
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
