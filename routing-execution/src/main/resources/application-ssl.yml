# SSL profile for routing-execution — activate with: SPRING_PROFILES_ACTIVE=dev,ssl
# Does NOT modify application.yml or application-dev.yml.
# Certs are generated by: bash generate-mtls-certs.sh
server:
  port: 8084
  ssl:
    enabled: true
    key-store: ${CLEARFLOW_CERTS_DIR:${user.dir}/certs}/routing-execution.p12
    key-store-password: clearflow
    key-store-type: PKCS12
    key-alias: routing-execution
    trust-store: ${CLEARFLOW_CERTS_DIR:${user.dir}/certs}/clearflow-truststore.p12
    trust-store-password: clearflow
    trust-store-type: PKCS12
    client-auth: want
