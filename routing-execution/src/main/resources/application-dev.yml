spring:
  datasource:
    url: jdbc:h2:mem:routing;DB_CLOSE_DELAY=-1;MODE=Oracle
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  sql:
    init:
      mode: always
  kafka:
    bootstrap-servers: localhost:29092
  artemis:
    broker-url: tcp://localhost:61616
    user: ${ARTEMIS_USER:clearflow}
    password: ${ARTEMIS_PASSWORD:clearflow123}
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:clearflow123}

camel:
  component:
    kafka:
      brokers: localhost:29092