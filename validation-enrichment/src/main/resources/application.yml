server:
  port: 8082
spring:
  application:
    name: validation-enrichment
  config:
    import: optional:configserver:http://config-server:8888
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521/CLEARFLOW}
    username: system
    password: ${ORACLE_PASSWORD:clearflow123}
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/clearflow}
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
  jpa:
    hibernate:
      ddl-auto: none
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
