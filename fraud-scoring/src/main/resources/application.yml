server:
  port: 8081
spring:
  application:
    name: fraud-scoring
  config:
    import: optional:configserver:http://config-server:8888
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:kafka:9092}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379
      password: ${REDIS_PASSWORD:clearflow123}
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
resilience4j:
  circuitbreaker:
    instances:
      lgbm:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
  retry:
    instances:
      lgbm:
        max-attempts: 3
        wait-duration: 200ms
