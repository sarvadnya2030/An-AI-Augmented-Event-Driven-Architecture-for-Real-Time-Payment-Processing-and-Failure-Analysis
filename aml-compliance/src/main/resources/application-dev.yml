spring:
  datasource:
    url: jdbc:h2:mem:aml;DB_CLOSE_DELAY=-1;MODE=Oracle
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  data:
    mongodb:
      uri: mongodb://localhost:27017/clearflow
  kafka:
    bootstrap-servers: localhost:29092
  artemis:
    broker-url: tcp://localhost:61616
    user: clearflow
    password: clearflow123

camel:
  component:
    kafka:
      brokers: localhost:29092
# Camunda Zeebe worker retries in background - non-blocking startup
camunda:
  client:
    zeebe:
      grpc-address: http://localhost:26500
      prefer-rest-over-grpc: false

management:
  health:
    zeebe:
      enabled: false
