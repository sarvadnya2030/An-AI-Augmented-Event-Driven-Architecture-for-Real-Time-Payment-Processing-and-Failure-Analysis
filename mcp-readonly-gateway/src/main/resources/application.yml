server:
  port: 8087

spring:
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  application:
    name: mcp-readonly-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      password: ${REDIS_PASSWORD:clearflow123}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  ai:
    mcp:
      server:
        name: clearflow-mcp-server
        version: 1.0.0
        type: SYNC
        sse-message-endpoint: /mcp/message
        sse-endpoint: /mcp/sse
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${OLLAMA_MODEL:qwen3.5:0.8b}
        options:
          temperature: 0.1

clearflow:
  elasticsearch:
    url: ${ELASTICSEARCH_URL:http://localhost:9200}
    index-pattern: clearflow-*
    max-log-entries: 200
  code-graph:
    path: ${CODE_GRAPH_PATH:../graphify-out/graph.json}
  llm:
    provider: nvidia
    nvidia:
      api-key: ${NVIDIA_API_KEY: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}
      model: nvidia/nemotron-3-nano-omni-30b-a3b-reasoning
      reasoning-budget: 16384
    ollama:
      base-url: http://localhost:11434
      model: qwen3:4b
    openrouter:
      base-url: https://openrouter.ai/api/v1
      api-key: ${OPENROUTER_API_KEY:}
      model: meta-llama/llama-3.3-70b-instruct

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  info:
    title: ClearFlow ${spring.application.name}
    version: 1.0.0
    description: ISO 20022 payment processing microservice
