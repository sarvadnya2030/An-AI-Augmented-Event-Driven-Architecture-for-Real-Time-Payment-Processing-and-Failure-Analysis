groups:
  - name: clearflow-alerts
    rules:
      - alert: GatewayDown
        expr: up{job="gateway"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Gateway is down"
      - alert: HighHttp5xxRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx response rate detected"
