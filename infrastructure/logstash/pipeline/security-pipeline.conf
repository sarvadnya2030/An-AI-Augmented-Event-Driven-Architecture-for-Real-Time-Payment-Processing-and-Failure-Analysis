# ClearFlow SIEM Security Pipeline
# Consumes HIGH-severity Kafka topics and writes to clearflow-security-* index.
# IMPORTANT: this file is merged with clearflow.conf into a single Logstash pipeline.
# All filter blocks here run on EVERY event (TCP + Kafka). Tags are the discriminator.

input {
  kafka {
    bootstrap_servers => "${KAFKA_BROKERS:kafka:9092}"
    topics => [
      "clearflow.aml.sanctions.hit",
      "clearflow.payment.blocked",
      "clearflow.compliance.alerts",
      "clearflow.fraud.evaluated",
      "clearflow.mcp.access.log"
    ]
    group_id => "logstash-siem-consumer"
    codec => json
    consumer_threads => 2
    decorate_events => true
  }
}

filter {
  # Mark ALL events from this Kafka input so the main pipeline output can exclude them.
  if [@metadata][kafka][topic] {
    mutate { add_tag => ["KAFKA_INPUT"] }
  }

  # Tag Kafka-sourced security events — keyed on the Kafka topic metadata so
  # we don't accidentally match TCP log entries that happen to have the same fields.
  if [@metadata][kafka][topic] == "clearflow.aml.sanctions.hit" {
    mutate { add_tag => ["SECURITY", "KAFKA_SECURITY", "AML_HIT"] }
  }
  if [@metadata][kafka][topic] == "clearflow.payment.blocked" {
    mutate { add_tag => ["SECURITY", "KAFKA_SECURITY", "FRAUD_BLOCKED"] }
  }
  if [@metadata][kafka][topic] == "clearflow.compliance.alerts" {
    mutate { add_tag => ["SECURITY", "KAFKA_SECURITY", "COMPLIANCE"] }
  }
  if [@metadata][kafka][topic] == "clearflow.fraud.evaluated" and [riskBand] == "CRITICAL" {
    mutate { add_tag => ["SECURITY", "KAFKA_SECURITY", "FRAUD_CRITICAL"] }
  }
  if [@metadata][kafka][topic] == "clearflow.mcp.access.log" {
    mutate { add_tag => ["KAFKA_SECURITY"] }
  }

  # Enrich only security-tagged events
  if "KAFKA_SECURITY" in [tags] {
    mutate {
      add_field => {
        "siem_severity" => "CRITICAL"
        "siem_app_name" => "clearflow"
      }
    }
    if [debtorIban] {
      mutate {
        gsub => ["debtorIban", "(?<=[A-Z]{2}[0-9]{2})[A-Z0-9]{6,24}(?=[A-Z0-9]{4})", "****"]
      }
    }
    if [creditorIban] {
      mutate {
        gsub => ["creditorIban", "(?<=[A-Z]{2}[0-9]{2})[A-Z0-9]{6,24}(?=[A-Z0-9]{4})", "****"]
      }
    }
  }
}

output {
  # Only route Kafka security events to the security index
  if "KAFKA_SECURITY" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS:http://elasticsearch:9200}"]
      index => "clearflow-security-%{+YYYY.MM.dd}"
    }
  }
}
