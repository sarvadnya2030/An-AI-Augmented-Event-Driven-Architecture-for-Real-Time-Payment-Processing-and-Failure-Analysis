input {
  beats {
    port => 5044
  }
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # ── Tag all events ────────────────────────────────────────────────────────
  mutate {
    add_field => { "environment" => "clearflow" }
  }

  # ── Parse ISO 8601 timestamp from message if present ─────────────────────
  if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }

  # ── Normalise service name ────────────────────────────────────────────────
  if ![service] {
    if [logger_name] =~ /gateway/ {
      mutate { add_field => { "service" => "gateway" } }
    } else if [logger_name] =~ /fraud/ {
      mutate { add_field => { "service" => "fraud-scoring" } }
    } else if [logger_name] =~ /compliance/ or [logger_name] =~ /aml/ {
      mutate { add_field => { "service" => "aml-compliance" } }
    } else if [logger_name] =~ /settlement/ {
      mutate { add_field => { "service" => "settlement" } }
    } else if [logger_name] =~ /audit/ {
      mutate { add_field => { "service" => "audit" } }
    } else if [logger_name] =~ /routing/ {
      mutate { add_field => { "service" => "routing-execution" } }
    } else if [logger_name] =~ /validation/ {
      mutate { add_field => { "service" => "validation-enrichment" } }
    } else {
      mutate { add_field => { "service" => "unknown" } }
    }
  }

  # ── Extract eventType from message field ─────────────────────────────────
  if [message] {
    grok {
      match => { "message" => "(?<eventType>FRAUD_SCORE_COMPUTED|AML_SCREENING_COMPLETE|AML_SANCTIONS_HIT|SETTLEMENT_COMPLETE|AUDIT_CHAIN_APPENDED|PAYMENT_SUBMITTED|PAYMENT_STATUS_UPDATE|RAIL_SELECTED|IBAN_VALIDATED|EMBARGO_CHECK)" }
      tag_on_failure => []
    }
  }

  # ── Alert level classification ────────────────────────────────────────────
  if [level] == "ERROR" or [riskBand] == "CRITICAL" or [screeningResult] == "HIT" or [message] =~ /SANCTIONS_HIT|BLOCKED|CRITICAL/ {
    mutate { add_field => { "alertLevel" => "HIGH" } }
  } else if [level] == "WARN" or [riskBand] == "HIGH" or [message] =~ /HIGH|WARN/ {
    mutate { add_field => { "alertLevel" => "MEDIUM" } }
  } else {
    mutate { add_field => { "alertLevel" => "LOW" } }
  }

  # ── Rail code → human name ────────────────────────────────────────────────
  if [rail] {
    translate {
      source => "rail"
      target => "railName"
      dictionary => {
        "SEPA_INSTANT"           => "SEPA Instant Credit Transfer"
        "SEPA_CREDIT_TRANSFER"   => "SEPA Credit Transfer"
        "FASTER_PAYMENTS"        => "Faster Payments (UK)"
        "CHAPS"                  => "CHAPS (UK High Value)"
        "CHIPS"                  => "CHIPS (US)"
        "FEDWIRE"                => "Fedwire Funds Service"
        "FEDACH"                 => "FedACH"
        "SWIFT_GPI"              => "SWIFT GPI"
        "SWIFT_MT103"            => "SWIFT MT103"
        "TARGET2"                => "TARGET2"
        "BACS"                   => "BACS"
        "INTERNAL"               => "Internal Transfer"
      }
      fallback => "Unknown Rail"
    }
  }

  # ── Fingerprint for deduplication ─────────────────────────────────────────
  if [paymentId] and [eventType] and [service] {
    fingerprint {
      source        => ["paymentId", "eventType", "service"]
      target        => "[@metadata][fingerprint]"
      method        => "SHA1"
      concatenate_sources => true
    }
  }

  # ── Strip PII / sensitive fields ─────────────────────────────────────────
  mutate {
    remove_field => ["debtorIban", "creditorIban", "pan", "cardNumber",
                     "password", "secret", "token", "apiKey"]
  }
}

output {
  # ── Per-service daily indices ─────────────────────────────────────────────
  if [service] == "gateway" {
    elasticsearch {
      hosts     => ["http://elasticsearch:9200"]
      index     => "clearflow-gateway-%{+YYYY.MM.dd}"
      document_id => "%{[@metadata][fingerprint]}"
    }
  } else if [service] == "fraud-scoring" {
    elasticsearch {
      hosts     => ["http://elasticsearch:9200"]
      index     => "clearflow-fraud-%{+YYYY.MM.dd}"
      document_id => "%{[@metadata][fingerprint]}"
    }
  } else if [service] == "aml-compliance" {
    elasticsearch {
      hosts     => ["http://elasticsearch:9200"]
      index     => "clearflow-aml-%{+YYYY.MM.dd}"
      document_id => "%{[@metadata][fingerprint]}"
    }
  } else if [service] == "settlement" {
    elasticsearch {
      hosts     => ["http://elasticsearch:9200"]
      index     => "clearflow-settlement-%{+YYYY.MM.dd}"
      document_id => "%{[@metadata][fingerprint]}"
    }
  } else if [service] == "audit" {
    elasticsearch {
      hosts     => ["http://elasticsearch:9200"]
      index     => "clearflow-audit-%{+YYYY.MM.dd}"
      document_id => "%{[@metadata][fingerprint]}"
    }
  } else {
    elasticsearch {
      hosts     => ["http://elasticsearch:9200"]
      index     => "clearflow-%{[service]}-%{+YYYY.MM.dd}"
    }
  }

  # ── HIGH alert events → dedicated alerts index ────────────────────────────
  if [alertLevel] == "HIGH" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "clearflow-alerts-%{+YYYY.MM.dd}"
    }
  }
}
