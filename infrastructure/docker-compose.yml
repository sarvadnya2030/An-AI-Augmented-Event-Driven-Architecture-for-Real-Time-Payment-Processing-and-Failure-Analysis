version: '3.9'

#name: clearflow

networks:
  clearflow-internal:
    driver: bridge
  clearflow-observability:
    driver: bridge

services:
  activemq-artemis:
    image: apache/activemq-artemis:2.31.2
    ports: ["61616:61616", "8161:8161"]
    environment:
      ARTEMIS_USER: clearflow
      ARTEMIS_PASSWORD: ${ARTEMIS_PASSWORD:-clearflow123}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8161/console"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks: [clearflow-internal]

  solace:
    image: solace/solace-pubsub-standard:10.8
    ports: ["8088:8080", "55555:55555", "8008:8008", "1883:1883"]
    environment:
      username_admin_globalaccesslevel: admin
      username_admin_password: ${SOLACE_ADMIN_PASSWORD:-admin}
    shm_size: 1g
    ulimits:
      core: 2
      nofile:
        soft: 2448
        hard: 6592
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      retries: 10
    networks: [clearflow-internal]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
    networks: [clearflow-internal]

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    depends_on: [zookeeper]
    ports: ["9092:9092", "29092:29092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,HOST://localhost:29092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 6000
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 6000
    command: >
      bash -c "
        echo 'Clearing stale broker znode...'
        (sleep 5 && /usr/bin/zookeeper-shell zookeeper:2181 rmr /brokers/ids/1) &
        /etc/confluent/docker/run
      "
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
    networks: [clearflow-internal]

  kafka-init:
    image: confluentinc/cp-kafka:7.5.3
    depends_on: [kafka]
    command: >
      bash -c "
        for t in clearflow.payment.initiated clearflow.fraud.evaluated clearflow.payment.blocked clearflow.payment.validated clearflow.payment.rejected clearflow.aml.sanctions.clear clearflow.aml.sanctions.hit clearflow.compliance.alerts clearflow.payment.routed clearflow.payment.failed clearflow.payment.settled clearflow.analytics.settlement clearflow.mcp.access.log clearflow.payment.dlq clearflow.fraud.dlq; do
          kafka-topics --create --if-not-exists --topic $$t --bootstrap-server kafka:9092 --replication-factor 1 --partitions 3;
        done"
    networks: [clearflow-internal]

  oracle:
    image: gvenzl/oracle-xe:21-slim
    ports: ["1521:1521"]
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-clearflow123}
      ORACLE_DATABASE: CLEARFLOW
    volumes:
      - ./oracle-init:/container-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 90s
    networks: [clearflow-internal]

  cockroachdb:
    image: cockroachdb/cockroach:v23.2.0
    command: start-single-node --insecure --store=cockroach-data
    ports: ["26257:26257", "28080:8080"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
    networks: [clearflow-internal]

  cassandra:
    image: cassandra:4.1.3
    ports: ["9042:9042"]
    environment:
      CASSANDRA_CLUSTER_NAME: ClearFlowCluster
      CASSANDRA_DC: datacenter1
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - ./cassandra-init:/docker-entrypoint-initdb.d
    networks: [clearflow-internal]

  mongodb:
    image: mongo:7.0.4
    ports: ["27017:27017"]
    environment:
      MONGO_INITDB_DATABASE: clearflow
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
    networks: [clearflow-internal]

  redis:
    image: redis:7.2.3-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-clearflow123}
    # Use an ephemeral host port to avoid local conflicts
    ports: ["6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-clearflow123}", "ping"]
    networks: [clearflow-internal]

  clickhouse:
    image: clickhouse/clickhouse-server:23.11-alpine
    ports: ["8123:8123", "9000:9000"]
    volumes:
      - ./clickhouse-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
    networks: [clearflow-internal, clearflow-observability]

  camunda:
    image: camunda/zeebe:8.3.4
    ports: ["26500:26500", "9600:9600"]
    environment:
      ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_CLASSNAME: io.camunda.zeebe.exporter.ElasticsearchExporter
      ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_URL: http://elasticsearch:9200
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ok"]
    networks: [clearflow-internal]

  vault:
    image: hashicorp/vault:1.15.4
    ports: ["8200:8200"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-clearflow-dev-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add: [IPC_LOCK]
    healthcheck:
      test: ["CMD", "vault", "status"]
    networks: [clearflow-internal]

  elasticsearch:
    image: elasticsearch:8.11.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx2g"
    ports: ["9200:9200"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
    networks: [clearflow-observability, clearflow-internal]

  kibana:
    image: kibana:8.11.3
    ports: ["5601:5601"]
    depends_on: [elasticsearch]
    networks: [clearflow-observability]

  logstash:
    image: logstash:8.11.3
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
      - ./logstash/templates:/usr/share/logstash/templates
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on: [elasticsearch]
    ports: ["5044:5044", "5000:5000"]
    networks: [clearflow-observability, clearflow-internal]

  jaeger:
    image: jaegertracing/all-in-one:1.52.0
    ports: ["16686:16686", "14268:14268", "6831:6831/udp"]
    environment:
      SPAN_STORAGE_TYPE: elasticsearch
      ES_SERVER_URLS: http://elasticsearch:9200
    networks: [clearflow-observability]

  prometheus:
    image: prom/prometheus:v2.48.1
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml
    networks: [clearflow-observability]

  grafana:
    image: grafana/grafana:10.2.3
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/custom/clearflow-main.json
    volumes:
      - ./grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards/custom
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    networks: [clearflow-observability]

  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: clearflow_compliance
      POSTGRES_USER: clearflow
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-clearflow}
    ports: ["5433:5432"]
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "clearflow", "-d", "clearflow_compliance"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [clearflow-internal]

  postgresql-sonar:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
    networks: [clearflow-internal]

  sonarqube:
    image: sonarqube:10.3.0-community
    ports: ["9001:9000"]
    depends_on: [postgresql-sonar]
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgresql-sonar:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD:-sonar}
    networks: [clearflow-internal, clearflow-observability]

  config-server:
    build:
      context: ..
      dockerfile: ./config-server/Dockerfile
    ports: ["8888:8888"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8888/actuator/health"]
    environment:
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    networks: [clearflow-internal]

  gateway:
    build:
      context: ..
      dockerfile: ./gateway/Dockerfile
    ports: ["8080:8080"]
    depends_on:
      config-server: { condition: service_started }
      kafka: { condition: service_healthy }
      redis: { condition: service_started }
      activemq-artemis: { condition: service_started }
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_CONFIG_IMPORT: "optional:configserver:"
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_ARTEMIS_BROKER_URL: tcp://activemq-artemis:61616
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle:1521/CLEARFLOW
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/clearflow
      SPRING_DATA_CASSANDRA_CONTACT_POINTS: cassandra
      SPRING_REDIS_HOST: redis
      REDIS_HOST: redis
      VAULT_TOKEN: ${VAULT_TOKEN:-clearflow-dev-token}
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/actuator/health"]
    networks: [clearflow-internal, clearflow-observability]

  fraud-scoring:
    build:
      context: ..
      dockerfile: ./fraud-scoring/Dockerfile
    ports: ["8081:8081"]
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:"
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_REDIS_HOST: redis
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8081/actuator/health"]
    networks: [clearflow-internal, clearflow-observability]

  validation-enrichment:
    build:
      context: ..
      dockerfile: ./validation-enrichment/Dockerfile
    ports: ["8082:8082"]
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:"
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_ARTEMIS_BROKER_URL: tcp://activemq-artemis:61616
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle:1521/CLEARFLOW
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/clearflow
      SPRING_REDIS_HOST: redis
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8082/actuator/health"]
    networks: [clearflow-internal, clearflow-observability]

  aml-compliance:
    build:
      context: ..
      dockerfile: ./aml-compliance/Dockerfile
    ports: ["8083:8083"]
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:"
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_ARTEMIS_BROKER_URL: tcp://activemq-artemis:61616
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle:1521/CLEARFLOW
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8083/actuator/health"]
    networks: [clearflow-internal, clearflow-observability]

  routing-execution:
    build:
      context: ..
      dockerfile: ./routing-execution/Dockerfile
    ports: ["8084:8084"]
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:"
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_ARTEMIS_BROKER_URL: tcp://activemq-artemis:61616
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle:1521/CLEARFLOW
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8084/actuator/health"]
    networks: [clearflow-internal, clearflow-observability]

  settlement:
    build:
      context: ..
      dockerfile: ./settlement/Dockerfile
    ports: ["8085:8085"]
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:"
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_ARTEMIS_BROKER_URL: tcp://activemq-artemis:61616
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle:1521/CLEARFLOW
      SPRING_DATA_CASSANDRA_CONTACT_POINTS: cassandra
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8085/actuator/health"]
    networks: [clearflow-internal, clearflow-observability]

  audit:
    build:
      context: ..
      dockerfile: ./audit/Dockerfile
    ports: ["8086:8086"]
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:"
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_CASSANDRA_CONTACT_POINTS: cassandra
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8086/actuator/health"]
    networks: [clearflow-internal, clearflow-observability]

  mcp-readonly-gateway:
    build:
      context: ..
      dockerfile: ./mcp-readonly-gateway/Dockerfile
    ports: ["8087:8087"]
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:"
      SPRING_CLOUD_CONFIG_URI: http://config-server:8888
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_REDIS_HOST: redis
      REDIS_HOST: redis
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    restart: on-failure:3
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8087/actuator/health"]
    networks: [clearflow-internal, clearflow-observability]
