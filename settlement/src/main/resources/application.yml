server:
  port: 8085
spring:
  application:
    name: settlement
  config:
    import: optional:configserver:http://config-server:8888
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521/CLEARFLOW}
    username: system
    password: ${ORACLE_PASSWORD:clearflow123}
  jpa:
    hibernate:
      ddl-auto: none
clearflow:
  analytics:
    clickhouse:
      url: ${CLICKHOUSE_URL:jdbc:clickhouse://localhost:8123/default}
      enabled: ${CLICKHOUSE_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
